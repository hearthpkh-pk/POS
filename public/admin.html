<!DOCTYPE html>
<html lang="th">

<head>
    <script>window.location.replace('/pos');</script>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Me POS - Employee Portal</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" id="dynamic-favicon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Me POS">
    <link class="favicon" rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#007AFF">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- HTML2Canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Flatpickr for Dashboards -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
</head>

<body>

    <div class="main-wrapper">
        <div
            class="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white border-b shadow-sm z-40 flex items-center px-4 justify-between">
            <div class="flex items-center">
                <button onclick="window.app?.toggleSidebar()" class="text-gray-600 focus:outline-none p-2 mr-2"><i
                        class="fas fa-bars text-xl"></i></button>
                <h1 class="text-lg font-black text-gray-800"><span class="text-red-600">M</span>e POS</h1>
            </div>
            <div class="text-xs text-gray-500" id="mobile-user-display">Staff</div>
        </div>

        <div id="sidebar-overlay"
            class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden transition-opacity opacity-0"></div>

        <div id="sidebar"
            class="sidebar fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 lg:flex transition-transform duration-300 ease-in-out">
            <div class="p-6 border-b hidden lg:block">
                <h1 class="text-2xl font-black text-gray-800"><span class="text-red-600">M</span>e POS</h1>
                <p class="text-xs text-gray-400 mt-1">by Mein Licht</p>
            </div>
            <div class="lg:hidden p-4 border-b flex justify-between items-center bg-gray-50">
                <span class="font-bold text-gray-700">เมนูหลัก</span>
                <button onclick="window.app?.toggleSidebar()" class="text-gray-500 p-2"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="flex-grow py-4 custom-scroll">
                <div class="px-6 py-2 text-xs font-bold text-gray-400 uppercase tracking-wider">หน้าร้าน</div>
                <div id="nav-pos-orders" class="sidebar-item active"><i
                        class="fas fa-cash-register w-6 text-center"></i><span>ขาย / ออเดอร์</span></div>
                <a href="/" target="_blank" class="sidebar-item"><i
                        class="fas fa-store w-6 text-center"></i><span>ดูหน้าเว็บลูกค้า</span></a>

                <div class="px-6 py-2 mt-6 text-xs font-bold text-gray-400 uppercase tracking-wider">หลังบ้าน</div>
                <div id="nav-admin-dashboard" class="sidebar-item"><i
                        class="fas fa-chart-line w-6 text-center"></i><span>แดชบอร์ด</span></div>
                <div id="nav-admin-history" class="sidebar-item"><i
                        class="fas fa-history w-6 text-center"></i><span>ประวัติการขาย</span></div>
                <div id="nav-admin-menu" class="sidebar-item"><i
                        class="fas fa-burger w-6 text-center"></i><span>จัดการเมนู</span></div>
                <div id="nav-admin-settings" class="sidebar-item"><i
                        class="fas fa-palette w-6 text-center"></i><span>ตั้งค่าหน้าเว็บ</span></div>
            </div>
            <div class="p-4 border-t bg-gray-50 hidden lg:block">
                <div class="text-xs text-gray-500">System: <span id="sys-status"
                        class="font-mono font-bold text-green-600">Online (Supabase)</span></div>
            </div>
        </div>

        <div id="main-content-area" class="flex-1 h-full relative w-full pt-14 lg:pt-0 bg-gray-100">
            <div id="loading-spinner"
                class="absolute inset-0 flex flex-col items-center justify-center bg-gray-100 z-50">
                <svg class="animate-spin h-10 w-10 text-[#007AFF] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <p class="text-gray-500 font-medium">กำลังโหลดข้อมูล...</p>
            </div>

            <!-- Root Container for Application Views -->
            <div id="app-container" class="h-full w-full"></div>

        </div>
    </div>

    <!-- Centralized Custom Modal -->
    <div id="custom-modal"
        class="fixed inset-0 bg-black bg-opacity-60 hidden z-[60] flex items-center justify-center p-4">
        <div id="modal-content-wrapper"
            class="bg-white rounded-xl shadow-2xl overflow-hidden w-full max-w-md flex flex-col max-h-[90vh] relative transition-all scale-100">
            <div class="bg-gray-50 px-5 py-3 border-b flex justify-between items-center shrink-0">
                <h3 id="modal-title" class="text-lg font-bold text-gray-800"></h3>
                <button onclick="document.getElementById('custom-modal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600 p-2 focus:outline-none"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="modal-message" class="p-0 bg-gray-100 flex justify-center overflow-y-auto"></div>
            <div id="modal-actions" class="bg-white px-5 py-3 border-t flex justify-end space-x-3 shrink-0">
                <button id="modal-cancel-btn"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium text-sm transition">ปิด</button>
                <button id="modal-confirm-btn"
                    class="px-4 py-2 bg-[#007AFF] text-white rounded-lg hover:bg-[#007AFF]/90 font-bold shadow text-sm transition">ยืนยัน</button>
            </div>
        </div>
    </div>

</body>

</html>
